<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구ME 발표팀 검색</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <header>
        <a href="#" id="logo">
            <img src="logo.png" alt="대구ME 로고" height="100" width="130">
        </a>
        <h1>대구ME 발표팀 검색</h1>
        <input type="text" id="searchInput" placeholder="이름을 입력하세요">
        <button id="searchButton">검색</button>
    </header>
    
    <main id="resultsContainer" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th>차수</th>
                    <th>날짜</th>
                    <th>발표 사제</th>
                    <th>성사 부부</th>
                    <th>사회 부부</th>
                    <th>자신 부부</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </main>

    <script src="script.js"></script>
</body>
</html>
